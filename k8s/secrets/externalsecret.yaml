apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: demo-app-secret
  namespace: dev
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: demo-app-secret
    creationPolicy: Owner
  data:
  - secretKey: db_password
    remoteRef:
      key: demo-app
      property: db_password
