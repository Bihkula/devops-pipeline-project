apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dev-engineer-binding
  namespace: dev
subjects:
- kind: ServiceAccount
  name: dev-engineer
  namespace: dev
roleRef:
  kind: Role
  name: dev-engineer-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: prod-deployer-binding
  namespace: prod
subjects:
- kind: ServiceAccount
  name: prod-deployer
  namespace: prod
roleRef:
  kind: Role
  name: prod-deployer-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sre-viewer-binding
subjects:
- kind: ServiceAccount
  name: sre-viewer
  namespace: platform
roleRef:
  kind: ClusterRole
  name: sre-viewer-role
  apiGroup: rbac.authorization.k8s.io
