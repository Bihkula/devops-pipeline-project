name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  security-scan-code:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep SAST scan
        uses: semgrep/semgrep-action@v1
        with:
          config: auto

  build-scan-sign:
    runs-on: ubuntu-latest
    needs: security-scan-code
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image name
        id: image
        run: echo "name=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build \
            -t $REGISTRY/${{ steps.image.outputs.name }}:${{ github.sha }} \
            -t $REGISTRY/${{ steps.image.outputs.name }}:latest \
            ./app

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ github.sha }}
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ github.sha }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Push images
        run: |
          docker push $REGISTRY/${{ steps.image.outputs.name }}:${{ github.sha }}
          docker push $REGISTRY/${{ steps.image.outputs.name }}:latest

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign images with Cosign (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' $REGISTRY/${{ steps.image.outputs.name }}:${{ github.sha }} | cut -d@ -f2)
          cosign sign --yes $REGISTRY/${{ steps.image.outputs.name }}@$DIGEST
